# Volcano Job demo: Julia finance domino chain scheduled by Volcano on compute workers.
# Mirrors DominoChain kubernetes-init pod layout (init handoff + pause container).
apiVersion: batch.volcano.sh/v1alpha1
kind: Job
metadata:
  name: julia-finance-volcano
  namespace: default
  labels:
    kbl.io/volcano-demo: "true"
    kbl.io/dominochain: julia-finance-volcano
spec:
  minAvailable: 1
  schedulerName: volcano
  queue: kbl-lab
  policies:
    - event: TaskCompleted
      action: CompleteJob
  tasks:
    - replicas: 1
      name: julia-chain
      policies:
        - event: TaskCompleted
          action: CompleteJob
      template:
        metadata:
          labels:
            kbl.io/volcano-demo: "true"
            kbl.io/dominochain: julia-finance-volcano
          annotations:
            kbl.io/runtime: kubernetes-init
        spec:
          schedulerName: volcano
          nodeSelector:
            kbl.io/lab-role: compute
          restartPolicy: Never
          volumes:
            - name: handoff
              emptyDir: {}
            - name: snapshot
              configMap:
                name: julia-finance-volcano-snapshot
          initContainers:
            - name: slot-0-load-curve-data
              image: kbl-domino-runner-julia:lab
              imagePullPolicy: IfNotPresent
              env:
                - name: KBL_COMMAND
                  value: julia:identity
                - name: KBL_INPUT
                  value: /kbl/input/snapshot.json
                - name: KBL_OUTPUT
                  value: /kbl/handoff/output.json
                - name: KBL_STEP_NAME
                  value: load-curve-data
                - name: KBL_JULIA_PROJECT
                  value: /opt/kbl/julia
                - name: KBL_JULIA_BIN
                  value: julia
              volumeMounts:
                - name: handoff
                  mountPath: /kbl/handoff
                - name: snapshot
                  mountPath: /kbl/input
                  readOnly: true
            - name: slot-1-interpolate-curve
              image: kbl-domino-runner-julia:lab
              imagePullPolicy: IfNotPresent
              env:
                - name: KBL_COMMAND
                  value: julia:interpolate
                - name: KBL_INPUT
                  value: /kbl/handoff/output.json
                - name: KBL_OUTPUT
                  value: /kbl/handoff/output.json
                - name: KBL_STEP_NAME
                  value: interpolate-curve
                - name: KBL_JULIA_PROJECT
                  value: /opt/kbl/julia
                - name: KBL_JULIA_BIN
                  value: julia
              volumeMounts:
                - name: handoff
                  mountPath: /kbl/handoff
                - name: snapshot
                  mountPath: /kbl/input
                  readOnly: true
            - name: slot-2-compute-greeks
              image: kbl-domino-runner-julia:lab
              imagePullPolicy: IfNotPresent
              env:
                - name: KBL_COMMAND
                  value: julia:greeks
                - name: KBL_INPUT
                  value: /kbl/handoff/output.json
                - name: KBL_OUTPUT
                  value: /kbl/handoff/output.json
                - name: KBL_STEP_NAME
                  value: compute-greeks
                - name: KBL_JULIA_PROJECT
                  value: /opt/kbl/julia
                - name: KBL_JULIA_BIN
                  value: julia
              volumeMounts:
                - name: handoff
                  mountPath: /kbl/handoff
                - name: snapshot
                  mountPath: /kbl/input
                  readOnly: true
          containers:
            - name: chain-complete
              image: registry.k8s.io/pause:3.9
              imagePullPolicy: IfNotPresent
              command: ["/pause"]
              volumeMounts:
                - name: handoff
                  mountPath: /kbl/handoff
