# Home lab profile for i9 / discrete-GPU workstations (32–64 GiB RAM recommended).
# 1 control-plane + 2 workers; worker 1 labeled for future GPU domino experiments.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: kbl-lab
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "kbl.io/lab-node=true,kbl.io/lab-role=control-plane"
    extraMounts:
      - hostPath: /tmp/kbl-lab/cp
        containerPath: /var/kbl
        readOnly: false
        selinuxRelabel: false
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "kbl.io/lab-node=true,kbl.io/lab-role=compute,kbl.io/gpu=present"
    extraMounts:
      - hostPath: /tmp/kbl-lab/w1
        containerPath: /var/kbl
        readOnly: false
        selinuxRelabel: false
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "kbl.io/lab-node=true,kbl.io/lab-role=compute,kbl.io/tsdb-node=true"
    extraMounts:
      - hostPath: /tmp/kbl-lab/w2
        containerPath: /var/kbl
        readOnly: false
        selinuxRelabel: false
