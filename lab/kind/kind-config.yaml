# Kind cluster config for the KBL local lab (single control-plane node).
# Extra mounts persist TSDB/controller store data under /var/kbl on the node.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: kbl-lab
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "kbl.io/lab-node=true"
    extraMounts:
      - hostPath: /tmp/kbl-lab
        containerPath: /var/kbl
        readOnly: false
        selinuxRelabel: false
