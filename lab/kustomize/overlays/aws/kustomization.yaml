# AWS/EKS overlay — patch image names to your ECR registry after CDK deploy.
# Example:
#   export KBL_ECR_REGISTRY=123456789012.dkr.ecr.us-east-1.amazonaws.com
#   kustomize edit set image kbl-controller=${KBL_ECR_REGISTRY}/kbl-controller:latest
# Or edit the images block below directly.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
commonLabels:
  kbl.io/lab: aws
images:
  - name: kbl-controller
    newName: REPLACE_ME.dkr.ecr.us-east-1.amazonaws.com/kbl-controller
    newTag: latest
  - name: kbl-tsdb
    newName: REPLACE_ME.dkr.ecr.us-east-1.amazonaws.com/kbl-tsdb
    newTag: latest
