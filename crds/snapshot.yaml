apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: snapshots.kbl.io
spec:
  group: kbl.io
  names:
    kind: Snapshot
    listKind: SnapshotList
    plural: snapshots
    singular: snapshot
    shortNames:
      - snap
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [timeSlice, sealed]
              properties:
                timeSlice:
                  type: string
                  description: ISO 8601 timestamp identifying the data time slice
                source:
                  type: object
                  properties:
                    inline:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    path:
                      type: string
                      description: Node-local filesystem path to snapshot data
                    uri:
                      type: string
                      description: Object store URI (s3://, gs://)
                computeContextRef:
                  type: string
                  description: ComputeContext that owns this snapshot's node-local data
                sealed:
                  type: boolean
                  description: When true, snapshot data is immutable
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Ready, Sealed, Error]
                snapshotID:
                  type: string
                  description: Deterministic hash of snapshot content
                sealedAt:
                  type: string
                  format: date-time
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: TimeSlice
          type: string
          jsonPath: .spec.timeSlice
        - name: Sealed
          type: boolean
          jsonPath: .spec.sealed
        - name: Phase
          type: string
          jsonPath: .status.phase
