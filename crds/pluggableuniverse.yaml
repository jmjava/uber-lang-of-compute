apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: pluggableuniverses.kbl.io
spec:
  group: kbl.io
  names:
    kind: PluggableUniverse
    listKind: PluggableUniverseList
    plural: pluggableuniverses
    singular: pluggableuniverse
    shortNames:
      - universe
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [executionEngine, dataLayer]
              properties:
                name:
                  type: string
                executionEngine:
                  type: object
                  properties:
                    type:
                      type: string
                      enum: [julia, python, go, builtin]
                    runtimeImage:
                      type: string
                dataLayer:
                  type: object
                  properties:
                    type:
                      type: string
                      enum: [sqlite, tsdb, memsql, lustre]
                    config:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                provisioningModel:
                  type: object
                  properties:
                    autoscaler:
                      type: boolean
                    minNodes:
                      type: integer
                    maxNodes:
                      type: integer
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Active, Degraded, Offline]
                contextCount:
                  type: integer
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Engine
          type: string
          jsonPath: .spec.executionEngine.type
        - name: Data
          type: string
          jsonPath: .spec.dataLayer.type
        - name: Phase
          type: string
          jsonPath: .status.phase
