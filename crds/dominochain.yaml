apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: dominochains.kbl.io
spec:
  group: kbl.io
  names:
    kind: DominoChain
    listKind: DominoChainList
    plural: dominochains
    singular: dominochain
    shortNames:
      - dchain
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [snapshot, steps]
              properties:
                snapshot:
                  type: object
                  required: [sealed]
                  properties:
                    timeSlice:
                      type: string
                    source:
                      type: object
                      properties:
                        inline:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                    sealed:
                      type: boolean
                steps:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [name, command]
                    properties:
                      name:
                        type: string
                      image:
                        type: string
                      command:
                        type: string
                      args:
                        type: array
                        items:
                          type: string
                runtime:
                  type: string
                  enum: [local, kubernetes-init, openkruise, volcano-init]
                storePath:
                  type: string
                runnerImage:
                  type: string
                nodeSelector:
                  type: object
                  additionalProperties:
                    type: string
                volcanoQueue:
                  type: string
                  description: Volcano queue for runtime volcano-init (default default)
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Running, Completed, Error]
                activeStep:
                  type: integer
                podName:
                  type: string
                snapshotID:
                  type: string
                finalOutputHash:
                  type: string
                stepResults:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      index:
                        type: integer
                      outputHash:
                        type: string
                      phase:
                        type: string
                message:
                  type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Runtime
          type: string
          jsonPath: .spec.runtime
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Step
          type: integer
          jsonPath: .status.activeStep
