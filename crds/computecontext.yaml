apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: computecontexts.kbl.io
spec:
  group: kbl.io
  names:
    kind: ComputeContext
    listKind: ComputeContextList
    plural: computecontexts
    singular: computecontext
    shortNames:
      - ctx
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [nodeName]
              properties:
                nodeName:
                  type: string
                  description: Kubernetes node hosting this compute context
                storePath:
                  type: string
                  description: Node-local path for snapshot data and memo cache
                storeType:
                  type: string
                  enum: [sqlite, tsdb]
                  default: sqlite
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Ready, Degraded, Offline]
                snapshotCount:
                  type: integer
                cacheEntries:
                  type: integer
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Node
          type: string
          jsonPath: .spec.nodeName
        - name: Store
          type: string
          jsonPath: .spec.storeType
        - name: Phase
          type: string
          jsonPath: .status.phase
