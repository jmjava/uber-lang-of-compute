apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: computecontexts.kbl.io
spec:
  group: kbl.io
  names:
    kind: ComputeContext
    listKind: ComputeContextList
    plural: computecontexts
    singular: computecontext
    shortNames:
      - ctx
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [nodeName]
              properties:
                nodeName:
                  type: string
                  description: Kubernetes node hosting this compute context
                storePath:
                  type: string
                  description: Node-local path for SQLite or TSDB data directory
                storeType:
                  type: string
                  enum: [sqlite, tsdb]
                  default: sqlite
                storeEndpoint:
                  type: string
                  description: HTTP endpoint for node-local TSDB (e.g. http://127.0.0.1:9090)
                dataPath:
                  type: string
                  description: Host path for TSDB DaemonSet data volume
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Ready, Degraded, Offline]
                storeEndpoint:
                  type: string
                snapshotCount:
                  type: integer
                cacheEntries:
                  type: integer
                conditions:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Node
          type: string
          jsonPath: .spec.nodeName
        - name: Store
          type: string
          jsonPath: .spec.storeType
        - name: Endpoint
          type: string
          jsonPath: .status.storeEndpoint
        - name: Phase
          type: string
          jsonPath: .status.phase
