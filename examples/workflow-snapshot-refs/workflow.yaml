apiVersion: kbl.io/v1alpha1
kind: Workflow
metadata:
  name: curve-from-refs
  namespace: default
spec:
  snapshotRef: curve-snap
  dominoRefs:
    - load-curve
    - interpolate-curve
  execution:
    chain: [load-curve, interpolate-curve]
    deterministic: true
  provisioning:
    nodeLocal: true
